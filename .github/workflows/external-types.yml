name: "external types"

permissions: {}

on:
  pull_request:

env:
  RUSTFLAGS: -Dwarnings

jobs:
  cargo-check-external-types:
    name: "cargo check-external-types"
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - id: toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # doesn't have usual versioned releases/tags
        with:
          toolchain: stable

      - uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # does not have recent tags

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: taiki-e/install-action@06203676c62f0d3c765be3f2fcfbebbcb02d09f5 # v2.69.6
        with:
          # renovate: taiki-e/install-action
          tool: cargo-check-external-types@0.4.0

      # install libmagic for dynamic linkage without robo9k/rust-magic-sys/setup-libmagic version
      - run: sudo apt-get update
      - run: sudo apt-get install libmagic1 libmagic-dev

      - run: cargo +nightly-2025-10-18 check-external-types --all-features --verbose --config external-types.toml
